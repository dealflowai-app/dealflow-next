<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>DealFlow AI - Offline</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      background: #F9FAFB;
      color: #1F2937;
    }

    header {
      background: #050E24;
      padding: 20px 32px;
      display: flex;
      align-items: center;
      gap: 12px;
    }

    header h1 {
      color: #FFFFFF;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: -0.02em;
    }

    header span {
      color: #6366F1;
      font-weight: 700;
    }

    main {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
      text-align: center;
    }

    .offline-icon {
      width: 80px;
      height: 80px;
      border-radius: 50%;
      background: #EEF2FF;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
    }

    .offline-icon svg {
      width: 40px;
      height: 40px;
      color: #6366F1;
    }

    h2 {
      font-size: 28px;
      font-weight: 700;
      color: #111827;
      margin-bottom: 8px;
    }

    p {
      font-size: 16px;
      color: #6B7280;
      margin-bottom: 32px;
      max-width: 400px;
    }

    button {
      background: #050E24;
      color: #FFFFFF;
      border: none;
      padding: 12px 32px;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: background 0.2s;
    }

    button:hover {
      background: #1a2744;
    }
  </style>
</head>
<body>
  <header>
    <h1>DealFlow <span>AI</span></h1>
  </header>
  <main>
    <div class="offline-icon">
      <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" d="M12 9v3.75m-9.303 3.376c-.866 1.5.217 3.374 1.948 3.374h14.71c1.73 0 2.813-1.874 1.948-3.374L13.949 3.378c-.866-1.5-3.032-1.5-3.898 0L2.697 16.126ZM12 15.75h.007v.008H12v-.008Z" />
      </svg>
    </div>
    <h2>You're offline</h2>
    <p>Check your connection and try again. Your data is safe and will sync when you reconnect.</p>
    <button onclick="window.location.reload()">Retry</button>
  </main>
</body>
</html>
